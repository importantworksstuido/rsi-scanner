<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kombinasyon Hesaplayıcı</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #f5f5f0;
      font-family: 'Georgia', serif;
      color: #111;
      min-height: 100vh;
    }
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button { opacity: 1; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #f0f0ee; }
    ::-webkit-scrollbar-thumb { background: #ccc; border-radius: 3px; }

    /* Responsive grid */
    .main-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 28px;
      align-items: start;
    }
    @media (max-width: 700px) {
      .main-grid { grid-template-columns: 1fr; }
      .sticky-col { position: static !important; }
    }

    /* Combo table label wrapping */
    .combo-label {
      font-size: 11px;
      color: #444;
      word-break: break-word;
      line-height: 1.4;
    }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useMemo } = React;

// ---- MATH UTILS ----
function gcd(a, b) {
  a = Math.abs(Math.round(a));
  b = Math.abs(Math.round(b));
  while (b) { [a, b] = [b, a % b]; }
  return a || 1;
}
function lcm(a, b) { return (a / gcd(a, b)) * b; }
function lcmArray(arr) {
  const filtered = arr.filter(x => x > 0);
  if (!filtered.length) return 0;
  return filtered.reduce((acc, val) => lcm(acc, val), filtered[0]);
}

// Her ondalıklı sayıyı tam sayıya çevirmek için gereken çarpanı bul
function toIntOdd(floatOdd) {
  // Maksimum 4 ondalık hassasiyet, en fazla 10000 çarpanı
  const str = floatOdd.toFixed(4);
  const decimals = (str.split('.')[1] || '').replace(/0+$/, '').length;
  const mult = Math.pow(10, decimals);
  return Math.round(floatOdd * mult);
}

function cartesian(arrays) {
  return arrays.reduce((acc, arr) => {
    const result = [];
    acc.forEach(a => arr.forEach(b => result.push([...a, b])));
    return result;
  }, [[]]);
}

// ---- INITIAL STATE ----
const INITIAL_EVENTS = [
  { id: 1, name: "Maç 1", outcomes: [{ label: "1", odd: "" }, { label: "X", odd: "" }, { label: "2", odd: "" }] },
  { id: 2, name: "Maç 2", outcomes: [{ label: "1", odd: "" }, { label: "X", odd: "" }, { label: "2", odd: "" }] },
];

// ---- COMPONENTS ----
function Btn({ onClick, children, style, ...rest }) {
  return (
    <button
      onClick={onClick}
      style={{
        fontFamily: "Georgia, serif",
        cursor: "pointer",
        border: "none",
        ...style
      }}
      {...rest}
    >{children}</button>
  );
}

function App() {
  const [events, setEvents] = useState(INITIAL_EVENTS);
  const [nextId, setNextId] = useState(3);
  const [budget, setBudget] = useState("");

  // ---- EVENT CRUD ----
  function addEvent() {
    setEvents(prev => [...prev, {
      id: nextId,
      name: `Maç ${nextId}`,
      outcomes: [{ label: "1", odd: "" }, { label: "X", odd: "" }, { label: "2", odd: "" }]
    }]);
    setNextId(n => n + 1);
  }

  function removeEvent(id) {
    setEvents(prev => prev.filter(e => e.id !== id));
  }

  function updateEventName(id, name) {
    setEvents(prev => prev.map(e => e.id === id ? { ...e, name } : e));
  }

  function addOutcome(eventId) {
    setEvents(prev => prev.map(e =>
      e.id === eventId
        ? { ...e, outcomes: [...e.outcomes, { label: `${e.outcomes.length + 1}`, odd: "" }] }
        : e
    ));
  }

  function removeOutcome(eventId, idx) {
    setEvents(prev => prev.map(e =>
      e.id === eventId
        ? { ...e, outcomes: e.outcomes.filter((_, i) => i !== idx) }
        : e
    ));
  }

  function updateOutcome(eventId, idx, field, value) {
    setEvents(prev => prev.map(e =>
      e.id === eventId
        ? { ...e, outcomes: e.outcomes.map((o, i) => i === idx ? { ...o, [field]: value } : o) }
        : e
    ));
  }

  // ---- HESAP ----
  const result = useMemo(() => {
    if (events.length < 1) return null;

    const allFilled = events.every(e =>
      e.outcomes.length >= 2 &&
      e.outcomes.every(o => o.odd !== "" && !isNaN(parseFloat(o.odd)) && parseFloat(o.odd) > 1.0)
    );
    if (!allFilled) return null;

    const eventOutcomes = events.map(e =>
      e.outcomes.map(o => ({
        eventName: e.name,
        label: o.label,
        odd: parseFloat(o.odd)
      }))
    );

    const combos = cartesian(eventOutcomes);
    if (combos.length > 10000) return { tooMany: true, count: combos.length };

    // Her kombinasyonun çarpım oranı
    const comboOdds = combos.map(combo => {
      const product = combo.reduce((acc, o) => acc * o.odd, 1);
      const label = combo.map(o => `${o.eventName}: ${o.label}`).join(" | ");
      return { label, product, combo };
    });

    // OKEK hesabı — her kombinasyon oranını tam sayıya çevir
    const intOdds = comboOdds.map(c => toIntOdd(c.product));
    const okek = lcmArray(intOdds);

    if (!isFinite(okek) || okek <= 0 || okek > 1e15) {
      // OKEK çok büyük — normalize ile göster
    }

    // Yatırım miktarları
    const stakes = comboOdds.map((c, i) => {
      const stake = okek / intOdds[i];
      const payout = stake * c.product;
      return { ...c, stake, payout };
    });

    const totalStake = stakes.reduce((s, x) => s + x.stake, 0);
    const minPayout = Math.min(...stakes.map(x => x.payout));
    const profit = minPayout - totalStake;
    const profitPct = (profit / totalStake) * 100;
    const hasArbitrage = profit > 0.0001;

    // Birimsiz normalize (min stake = 1)
    const minStake = Math.min(...stakes.map(x => x.stake));
    const normalized = stakes.map(x => ({
      ...x,
      stakeN: x.stake / minStake,
      payoutN: x.payout / minStake,
    }));
    const totalN = totalStake / minStake;

    return {
      combos: normalized,
      okek,
      totalN,
      profitPct,
      hasArbitrage,
      count: combos.length,
      tooMany: false,
    };
  }, [events]);

  const budgetNum = parseFloat(budget) || 0;

  // ---- UI HELPERS ----
  const inputBase = {
    border: "1px solid #e0e0e0",
    borderRadius: "6px",
    padding: "6px 8px",
    fontFamily: "Georgia, serif",
    outline: "none",
    background: "#fff",
    color: "#111",
    fontSize: "13px",
  };

  const cardStyle = {
    background: "#fff",
    border: "1px solid #ddd",
    borderRadius: "10px",
    padding: "16px",
    marginBottom: "14px",
  };

  // ---- RENDER ----
  return (
    <div style={{ minHeight: "100vh", background: "#f5f5f0", fontFamily: "Georgia, serif", padding: "32px 16px" }}>
      <div style={{ maxWidth: "980px", margin: "0 auto" }}>

        {/* Başlık */}
        <div style={{ marginBottom: "32px", borderBottom: "2px solid #111", paddingBottom: "16px" }}>
          <h1 style={{ fontSize: "26px", fontWeight: "bold", color: "#111", letterSpacing: "-0.5px" }}>
            Kombinasyon Hesaplayıcı
          </h1>
          <p style={{ color: "#888", marginTop: "6px", fontSize: "13px" }}>
            Olay ekle → oranları gir → tüm kombinasyonlar + OKEK + arbitraj analizi
          </p>
        </div>

        <div className="main-grid">

          {/* SOL — Olaylar */}
          <div>
            {events.map((event) => (
              <div key={event.id} style={cardStyle}>
                {/* Olay başlığı */}
                <div style={{ display: "flex", alignItems: "center", gap: "8px", marginBottom: "12px" }}>
                  <input
                    value={event.name}
                    onChange={e => updateEventName(event.id, e.target.value)}
                    style={{
                      flex: 1,
                      border: "none",
                      borderBottom: "1px solid #ddd",
                      fontSize: "14px",
                      fontWeight: "bold",
                      color: "#111",
                      background: "transparent",
                      outline: "none",
                      padding: "2px 0",
                      fontFamily: "Georgia, serif"
                    }}
                  />
                  {events.length > 1 && (
                    <Btn onClick={() => removeEvent(event.id)} style={{
                      background: "none", border: "none", color: "#ccc", fontSize: "16px", lineHeight: 1, padding: "0 4px"
                    }}>✕</Btn>
                  )}
                </div>

                {/* Sonuç satırları */}
                {event.outcomes.map((o, oi) => (
                  <div key={oi} style={{ display: "flex", gap: "8px", marginBottom: "8px", alignItems: "center" }}>
                    <input
                      value={o.label}
                      onChange={e => updateOutcome(event.id, oi, "label", e.target.value)}
                      placeholder="sonuç"
                      style={{ ...inputBase, width: "58px", flexShrink: 0 }}
                    />
                    <input
                      type="number"
                      step="0.01"
                      min="1.01"
                      value={o.odd}
                      onChange={e => updateOutcome(event.id, oi, "odd", e.target.value)}
                      placeholder="oran"
                      style={{ ...inputBase, flex: 1, fontSize: "15px", fontWeight: "bold" }}
                    />
                    {event.outcomes.length > 2 && (
                      <Btn onClick={() => removeOutcome(event.id, oi)} style={{
                        background: "none", border: "none", color: "#ccc", fontSize: "14px", padding: "0 4px"
                      }}>✕</Btn>
                    )}
                  </div>
                ))}

                <Btn onClick={() => addOutcome(event.id)} style={{
                  background: "none",
                  border: "1px dashed #ccc",
                  borderRadius: "6px",
                  color: "#aaa",
                  fontSize: "12px",
                  padding: "5px 12px",
                  width: "100%",
                  marginTop: "4px",
                }}>+ sonuç ekle</Btn>
              </div>
            ))}

            <Btn onClick={addEvent} style={{
              background: "#111",
              color: "#fff",
              borderRadius: "8px",
              padding: "10px 20px",
              fontSize: "13px",
              width: "100%",
              letterSpacing: "0.5px"
            }}>+ Olay Ekle</Btn>

            {/* Olay sayısı bilgisi */}
            {result && !result.tooMany && (
              <div style={{ marginTop: "10px", fontSize: "12px", color: "#aaa", textAlign: "center" }}>
                {events.length} olay × sonuçlar = {result.count} kombinasyon
              </div>
            )}
          </div>

          {/* SAĞ — Sonuçlar */}
          <div className="sticky-col" style={{ position: "sticky", top: "20px" }}>

            {/* Bütçe girişi */}
            <div style={cardStyle}>
              <div style={{ fontSize: "11px", color: "#aaa", letterSpacing: "1px", marginBottom: "8px", textTransform: "uppercase" }}>
                Test Bütçesi (₺)
              </div>
              <input
                type="number"
                placeholder="örn: 1000"
                value={budget}
                onChange={e => setBudget(e.target.value)}
                style={{
                  ...inputBase,
                  width: "100%",
                  fontSize: "20px",
                  fontWeight: "bold",
                  padding: "8px 12px",
                  border: "1px solid #e0e0e0",
                }}
              />
              {budgetNum > 0 && (
                <div style={{ fontSize: "11px", color: "#aaa", marginTop: "6px" }}>
                  Tablodaki yatır/gelir değerleri {budgetNum.toFixed(0)}₺ bütçeye göre
                </div>
              )}
            </div>

            {/* Yükleniyor / Hata / Sonuç */}
            {!result ? (
              <div style={{ ...cardStyle, padding: "40px 20px", textAlign: "center", color: "#bbb", fontSize: "13px" }}>
                Tüm oranları gir (her oran &gt; 1.00 olmalı)
              </div>
            ) : result.tooMany ? (
              <div style={{ ...cardStyle, padding: "20px", color: "#e74c3c", fontSize: "13px" }}>
                ⚠️ {result.count.toLocaleString()} kombinasyon — çok fazla. Olay sayısını veya sonuç sayısını azalt.
              </div>
            ) : (
              <>
                {/* Arbitraj banner */}
                <div style={{
                  background: result.hasArbitrage ? "#f0faf4" : "#fff8f7",
                  border: `2px solid ${result.hasArbitrage ? "#27ae60" : "#e74c3c"}`,
                  borderRadius: "10px",
                  padding: "16px 20px",
                  marginBottom: "14px",
                  display: "flex",
                  justifyContent: "space-between",
                  alignItems: "center"
                }}>
                  <div>
                    <div style={{ fontWeight: "bold", fontSize: "15px", color: result.hasArbitrage ? "#27ae60" : "#e74c3c" }}>
                      {result.hasArbitrage ? "✓ ARBİTRAJ VAR" : "✗ ARBİTRAJ YOK"}
                    </div>
                    <div style={{ fontSize: "11px", color: "#aaa", marginTop: "4px" }}>
                      {result.count} kombinasyon · OKEK: {result.okek > 1e12 ? result.okek.toExponential(2) : result.okek.toLocaleString()}
                    </div>
                  </div>
                  <div style={{
                    fontSize: "28px",
                    fontWeight: "bold",
                    color: result.hasArbitrage ? "#27ae60" : "#e74c3c",
                    fontFamily: "Georgia, serif"
                  }}>
                    {result.hasArbitrage ? "+" : ""}{result.profitPct.toFixed(3)}%
                  </div>
                </div>

                {/* Kombinasyon tablosu */}
                <div style={{ background: "#fff", border: "1px solid #ddd", borderRadius: "10px", overflow: "hidden", marginBottom: "14px" }}>
                  {/* Tablo başlığı */}
                  <div style={{
                    padding: "8px 12px",
                    borderBottom: "1px solid #eee",
                    display: "grid",
                    gridTemplateColumns: "1fr 72px 72px",
                    gap: "6px"
                  }}>
                    {["Kombinasyon", "Yatır", "Gelir"].map((h, i) => (
                      <div key={h} style={{
                        fontSize: "10px", color: "#aaa", textTransform: "uppercase",
                        letterSpacing: "1px", textAlign: i > 0 ? "right" : "left"
                      }}>{h}</div>
                    ))}
                  </div>

                  {/* Satırlar */}
                  <div style={{ maxHeight: "380px", overflowY: "auto" }}>
                    {result.combos.map((c, i) => {
                      const stakeVal = budgetNum > 0
                        ? (c.stakeN / result.totalN) * budgetNum
                        : c.stakeN;
                      const payoutVal = budgetNum > 0
                        ? (c.payoutN / result.totalN) * budgetNum
                        : c.payoutN;
                      return (
                        <div key={i} style={{
                          padding: "7px 12px",
                          borderBottom: "1px solid #f5f5f5",
                          display: "grid",
                          gridTemplateColumns: "1fr 72px 72px",
                          gap: "6px",
                          alignItems: "center",
                          background: i % 2 === 0 ? "#fff" : "#fafafa"
                        }}>
                          <div className="combo-label">{c.label}</div>
                          <div style={{ fontSize: "12px", fontWeight: "bold", color: "#111", textAlign: "right", fontFamily: "Georgia, serif" }}>
                            {budgetNum > 0 ? `${stakeVal.toFixed(2)}₺` : stakeVal.toFixed(2)}
                          </div>
                          <div style={{ fontSize: "12px", color: "#27ae60", textAlign: "right", fontFamily: "Georgia, serif" }}>
                            {budgetNum > 0 ? `${payoutVal.toFixed(2)}₺` : payoutVal.toFixed(2)}
                          </div>
                        </div>
                      );
                    })}
                  </div>

                  {/* Toplam satırı */}
                  <div style={{
                    padding: "9px 12px",
                    borderTop: "2px solid #eee",
                    display: "grid",
                    gridTemplateColumns: "1fr 72px 72px",
                    gap: "6px"
                  }}>
                    <div style={{ fontSize: "12px", fontWeight: "bold", color: "#111" }}>TOPLAM</div>
                    <div style={{ fontSize: "12px", fontWeight: "bold", color: "#111", textAlign: "right" }}>
                      {budgetNum > 0 ? `${budgetNum.toFixed(2)}₺` : result.totalN.toFixed(2)}
                    </div>
                    <div style={{ fontSize: "12px", fontWeight: "bold", color: result.hasArbitrage ? "#27ae60" : "#e74c3c", textAlign: "right" }}>
                      {budgetNum > 0
                        ? `+${(budgetNum * result.profitPct / 100).toFixed(2)}₺`
                        : `${result.profitPct >= 0 ? "+" : ""}${result.profitPct.toFixed(3)}%`}
                    </div>
                  </div>
                </div>

                {/* Açıklama notu */}
                <div style={{ fontSize: "11px", color: "#bbb", lineHeight: "1.6", padding: "0 2px" }}>
                  <strong style={{ color: "#aaa" }}>OKEK yöntemi:</strong> Kombinasyon oranları tam sayıya çevrilip OKEK alınır.
                  Her kombinasyona OKEK ÷ kendi tam sayı oranı kadar birim yatırılır.
                  Toplam yatırım &lt; minimum gelir ise arbitraj mevcut.
                </div>
              </>
            )}
          </div>
        </div>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
</html>
