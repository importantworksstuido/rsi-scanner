<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kombinasyon Hesaplayıcı</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; overflow-x: hidden; }
    body { background: #faf9f6; font-family: 'Georgia', serif; color: #111; }
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-thumb { background: #ccc; border-radius: 3px; }
    .layout {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
      align-items: start;
    }
    .result-col { position: sticky; top: 20px; }
    @media (max-width: 680px) {
      .layout { grid-template-columns: 1fr; }
      .result-col { position: static; }
    }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useMemo } = React;

function gcd(a, b) {
  a = Math.abs(Math.round(a)); b = Math.abs(Math.round(b));
  while (b) { [a, b] = [b, a % b]; }
  return a || 1;
}
function lcm(a, b) { return (a / gcd(a, b)) * b; }
function lcmArray(arr) {
  const f = arr.filter(x => x > 0);
  if (!f.length) return 0;
  return f.reduce((acc, v) => lcm(acc, v), f[0]);
}
function toIntOdd(floatOdd) {
  const str = floatOdd.toFixed(4);
  const dec = (str.split('.')[1] || '').replace(/0+$/, '').length;
  return Math.round(floatOdd * Math.pow(10, dec));
}
function cartesian(arrays) {
  return arrays.reduce((acc, arr) => {
    const r = []; acc.forEach(a => arr.forEach(b => r.push([...a, b]))); return r;
  }, [[]]);
}
function parseOdds(text) {
  return text.split(/[\s,;]+/).map(s => parseFloat(s.replace(',','.'))).filter(n => !isNaN(n) && n > 1.0);
}

const S = {
  card: { background: "#fff", border: "1px solid #e8e8e4", borderRadius: "10px", padding: "16px", marginBottom: "12px" },
  input: { border: "1px solid #e0e0dc", borderRadius: "6px", padding: "6px 9px", fontFamily: "Georgia,serif", fontSize: "14px", color: "#111", outline: "none", background: "#fff", width: "100%" },
  btnGhost: { background: "none", border: "1px dashed #ccc", borderRadius: "6px", color: "#aaa", fontSize: "12px", padding: "6px 12px", width: "100%", cursor: "pointer", fontFamily: "Georgia,serif", marginTop: "6px" },
  btnPrimary: { background: "#111", color: "#fff", border: "none", borderRadius: "8px", padding: "12px 20px", fontSize: "14px", cursor: "pointer", width: "100%", fontFamily: "Georgia,serif" },
  btnX: { background: "none", border: "none", color: "#ccc", cursor: "pointer", fontSize: "18px", padding: "0 4px", flexShrink: 0 },
  label: { fontSize: "10px", color: "#aaa", textTransform: "uppercase", letterSpacing: "1px", marginBottom: "8px", display: "block" },
};

const INIT = [
  { id: 1, name: "Olay 1", outcomes: [{ label: "1", odd: "" }, { label: "X", odd: "" }, { label: "2", odd: "" }] },
  { id: 2, name: "Olay 2", outcomes: [{ label: "1", odd: "" }, { label: "X", odd: "" }, { label: "2", odd: "" }] },
];

function App() {
  const [events, setEvents] = useState(INIT);
  const [nextId, setNextId] = useState(3);
  const [budget, setBudget] = useState("");
  const [pasteModes, setPasteModes] = useState({});
  const [pasteTexts, setPasteTexts] = useState({});

  const addEvent = () => {
    setEvents(p => [...p, { id: nextId, name: `Olay ${nextId}`, outcomes: [{ label: "1", odd: "" }, { label: "X", odd: "" }, { label: "2", odd: "" }] }]);
    setNextId(n => n + 1);
  };
  const removeEvent = id => setEvents(p => p.filter(e => e.id !== id));
  const updateName = (id, v) => setEvents(p => p.map(e => e.id === id ? { ...e, name: v } : e));
  const addOutcome = id => setEvents(p => p.map(e => e.id === id ? { ...e, outcomes: [...e.outcomes, { label: `${e.outcomes.length + 1}`, odd: "" }] } : e));
  const removeOutcome = (id, i) => setEvents(p => p.map(e => e.id === id ? { ...e, outcomes: e.outcomes.filter((_, j) => j !== i) } : e));
  const updateOutcome = (id, i, f, v) => setEvents(p => p.map(e => e.id === id ? { ...e, outcomes: e.outcomes.map((o, j) => j === i ? { ...o, [f]: v } : o) } : e));

  const applyPaste = (id) => {
    const odds = parseOdds(pasteTexts[id] || "");
    if (odds.length < 2) return;
    setEvents(p => p.map(e => e.id === id ? { ...e, outcomes: odds.map((odd, i) => ({ label: `${i + 1}`, odd: String(odd) })) } : e));
    setPasteModes(p => ({ ...p, [id]: false }));
    setPasteTexts(p => ({ ...p, [id]: "" }));
  };

  const result = useMemo(() => {
    const allFilled = events.every(e => e.outcomes.length >= 2 && e.outcomes.every(o => o.odd !== "" && parseFloat(o.odd) > 1.0));
    if (!allFilled) return null;
    const eventOutcomes = events.map(e => e.outcomes.map(o => ({ ev: e.name, label: o.label, odd: parseFloat(o.odd) })));
    const combos = cartesian(eventOutcomes);
    if (combos.length > 50000) return { tooMany: true, count: combos.length };
    const comboOdds = combos.map(combo => ({ label: combo.map(o => `${o.ev}:${o.label}`).join(" | "), product: combo.reduce((a, o) => a * o.odd, 1) }));
    const intOdds = comboOdds.map(c => toIntOdd(c.product));
    const okek = lcmArray(intOdds);
    const stakes = comboOdds.map((c, i) => { const stake = okek / intOdds[i]; return { ...c, stake, payout: stake * c.product }; });
    const total = stakes.reduce((s, x) => s + x.stake, 0);
    const minPayout = Math.min(...stakes.map(x => x.payout));
    const profit = minPayout - total;
    const profitPct = (profit / total) * 100;
    const mn = Math.min(...stakes.map(x => x.stake));
    const norm = stakes.map(x => ({ ...x, stakeN: x.stake / mn, payoutN: x.payout / mn }));
    return { combos: norm, okek, totalN: total / mn, profitPct, hasArb: profit > 0.0001, count: combos.length, tooMany: false };
  }, [events]);

  const budgetNum = parseFloat(budget) || 0;
  const arb = result && !result.tooMany;
  const color = arb ? (result.hasArb ? "#1a9a5c" : "#d63b2f") : "#999";

  return (
    <div style={{ minHeight: "100vh", background: "#faf9f6", fontFamily: "'Georgia','Times New Roman',serif", padding: "24px 16px", color: "#111" }}>
      <div style={{ maxWidth: "960px", margin: "0 auto" }}>

        {/* Başlık */}
        <div style={{ borderBottom: "2px solid #111", paddingBottom: "14px", marginBottom: "24px" }}>
          <h1 style={{ fontSize: "22px", fontWeight: "bold", letterSpacing: "-0.5px" }}>Kombinasyon Hesaplayıcı</h1>
          <p style={{ color: "#999", fontSize: "12px", marginTop: "4px" }}>Olay ekle → manuel gir veya yapıştır → OKEK + arbitraj</p>
        </div>

        <div className="layout">

          {/* SOL — Olaylar */}
          <div>
            {events.map(ev => {
              const isPaste = !!pasteModes[ev.id];
              const parsedCount = parseOdds(pasteTexts[ev.id] || "").length;
              return (
                <div key={ev.id} style={S.card}>
                  {/* Olay başlığı + toggle */}
                  <div style={{ display: "flex", gap: "8px", alignItems: "center", marginBottom: "12px" }}>
                    <input value={ev.name} onChange={e => updateName(ev.id, e.target.value)}
                      style={{ flex: 1, border: "none", borderBottom: "1px solid #ddd", fontSize: "15px", fontWeight: "bold", background: "transparent", outline: "none", padding: "2px 0", fontFamily: "Georgia,serif", minWidth: 0 }} />
                    <div style={{ display: "flex", background: "#f0f0ec", borderRadius: "6px", padding: "2px", flexShrink: 0 }}>
                      {["Manuel", "Yapıştır"].map((lbl, li) => {
                        const active = li === 0 ? !isPaste : isPaste;
                        return (
                          <button key={lbl} onClick={() => setPasteModes(p => ({ ...p, [ev.id]: li === 1 }))}
                            style={{ padding: "5px 10px", fontSize: "12px", cursor: "pointer", border: "none", fontFamily: "Georgia,serif", borderRadius: "5px", background: active ? "#111" : "transparent", color: active ? "#fff" : "#aaa" }}>
                            {lbl}
                          </button>
                        );
                      })}
                    </div>
                    {events.length > 1 && <button style={S.btnX} onClick={() => removeEvent(ev.id)}>✕</button>}
                  </div>

                  {isPaste ? (
                    <div>
                      <div style={{ fontSize: "12px", color: "#aaa", marginBottom: "6px" }}>
                        Oranları boşluk veya virgülle yapıştır — istediğin kadar
                      </div>
                      <textarea value={pasteTexts[ev.id] || ""} onChange={e => setPasteTexts(p => ({ ...p, [ev.id]: e.target.value }))}
                        placeholder={"2.71 3.21 1.91 1.46 1.13\nveya: 2.71, 3.21, 1.91"} rows={4}
                        style={{ width: "100%", border: "1px solid #e0e0dc", borderRadius: "6px", padding: "10px", fontFamily: "Georgia,serif", fontSize: "14px", color: "#111", outline: "none", resize: "vertical", background: "#fafaf8" }} />
                      {parsedCount > 0 && (
                        <div style={{ fontSize: "12px", color: "#888", marginTop: "6px" }}>
                          {parsedCount} oran algılandı
                        </div>
                      )}
                      <button onClick={() => applyPaste(ev.id)} disabled={parsedCount < 2}
                        style={{ ...S.btnPrimary, marginTop: "10px", opacity: parsedCount < 2 ? 0.4 : 1 }}>
                        Uygula →
                      </button>
                    </div>
                  ) : (
                    <div>
                      {ev.outcomes.map((o, oi) => (
                        <div key={oi} style={{ display: "flex", gap: "8px", marginBottom: "8px", alignItems: "center" }}>
                          <input value={o.label} onChange={e => updateOutcome(ev.id, oi, "label", e.target.value)} placeholder="sonuç"
                            style={{ ...S.input, width: "64px", flexShrink: 0 }} />
                          <input type="number" step="0.01" min="1.01" value={o.odd}
                            onChange={e => updateOutcome(ev.id, oi, "odd", e.target.value)} placeholder="oran"
                            style={{ ...S.input, fontSize: "16px", fontWeight: "bold" }} />
                          {ev.outcomes.length > 2 && <button style={S.btnX} onClick={() => removeOutcome(ev.id, oi)}>✕</button>}
                        </div>
                      ))}
                      <button style={S.btnGhost} onClick={() => addOutcome(ev.id)}>+ sonuç ekle</button>
                      <div style={{ fontSize: "11px", color: "#bbb", marginTop: "6px", textAlign: "right" }}>
                        {ev.outcomes.filter(o => o.odd !== "" && parseFloat(o.odd) > 1).length} / {ev.outcomes.length} oran girildi
                      </div>
                    </div>
                  )}
                </div>
              );
            })}

            <button style={S.btnPrimary} onClick={addEvent}>+ Olay Ekle</button>
            {arb && (
              <div style={{ textAlign: "center", fontSize: "12px", color: "#bbb", marginTop: "8px" }}>
                {events.map(e => e.outcomes.length).join(" × ")} = {result.count} kombinasyon
              </div>
            )}
          </div>

          {/* SAĞ — Sonuç */}
          <div className="result-col">
            {/* Bütçe */}
            <div style={S.card}>
              <span style={S.label}>Test Bütçesi (₺)</span>
              <input type="number" placeholder="örn: 1000" value={budget} onChange={e => setBudget(e.target.value)}
                style={{ ...S.input, fontSize: "22px", fontWeight: "bold", padding: "10px 12px" }} />
            </div>

            {!result ? (
              <div style={{ ...S.card, padding: "40px 20px", textAlign: "center", color: "#bbb", fontSize: "13px" }}>
                Tüm oranları gir (her oran &gt; 1.00)
              </div>
            ) : result.tooMany ? (
              <div style={{ ...S.card, color: "#d63b2f", fontSize: "13px" }}>
                ⚠️ {result.count.toLocaleString()} kombinasyon — çok fazla.
              </div>
            ) : (
              <>
                {/* Arbitraj banner */}
                <div style={{ background: result.hasArb ? "#f2fbf6" : "#fff7f6", border: `2px solid ${color}`, borderRadius: "10px", padding: "16px 18px", marginBottom: "12px", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                  <div>
                    <div style={{ fontWeight: "bold", fontSize: "15px", color }}>{result.hasArb ? "✓ ARBİTRAJ VAR" : "✗ ARBİTRAJ YOK"}</div>
                    <div style={{ fontSize: "11px", color: "#aaa", marginTop: "4px" }}>
                      {result.count} kombinasyon · OKEK: {result.okek > 1e12 ? result.okek.toExponential(2) : result.okek.toLocaleString()}
                    </div>
                  </div>
                  <div style={{ fontSize: "28px", fontWeight: "bold", color, fontFamily: "Georgia,serif" }}>
                    {result.hasArb ? "+" : ""}{result.profitPct.toFixed(3)}%
                  </div>
                </div>

                {/* Tablo */}
                <div style={{ background: "#fff", border: "1px solid #e8e8e4", borderRadius: "10px", overflow: "hidden", marginBottom: "12px" }}>
                  <div style={{ display: "grid", gridTemplateColumns: "1fr 70px 70px", gap: "4px", padding: "8px 12px", borderBottom: "1px solid #eee" }}>
                    {["Kombinasyon", "Yatır", "Gelir"].map((h, i) => (
                      <div key={h} style={{ fontSize: "10px", color: "#aaa", textTransform: "uppercase", letterSpacing: "1px", textAlign: i > 0 ? "right" : "left" }}>{h}</div>
                    ))}
                  </div>
                  <div style={{ maxHeight: "380px", overflowY: "auto" }}>
                    {result.combos.map((c, i) => {
                      const sv = budgetNum > 0 ? (c.stakeN / result.totalN) * budgetNum : c.stakeN;
                      const pv = budgetNum > 0 ? (c.payoutN / result.totalN) * budgetNum : c.payoutN;
                      return (
                        <div key={i} style={{ display: "grid", gridTemplateColumns: "1fr 70px 70px", gap: "4px", padding: "7px 12px", borderBottom: "1px solid #f5f5f3", alignItems: "center", background: i % 2 ? "#faf9f6" : "#fff" }}>
                          <div style={{ fontSize: "11px", color: "#555", lineHeight: "1.5", wordBreak: "break-word" }}>{c.label}</div>
                          <div style={{ fontSize: "12px", fontWeight: "bold", textAlign: "right" }}>{budgetNum > 0 ? `${sv.toFixed(2)}₺` : sv.toFixed(2)}</div>
                          <div style={{ fontSize: "12px", color: "#1a9a5c", textAlign: "right" }}>{budgetNum > 0 ? `${pv.toFixed(2)}₺` : pv.toFixed(2)}</div>
                        </div>
                      );
                    })}
                  </div>
                  <div style={{ display: "grid", gridTemplateColumns: "1fr 70px 70px", gap: "4px", padding: "9px 12px", borderTop: "2px solid #eee" }}>
                    <div style={{ fontSize: "12px", fontWeight: "bold" }}>TOPLAM</div>
                    <div style={{ fontSize: "12px", fontWeight: "bold", textAlign: "right" }}>{budgetNum > 0 ? `${budgetNum.toFixed(2)}₺` : result.totalN.toFixed(2)}</div>
                    <div style={{ fontSize: "12px", fontWeight: "bold", color, textAlign: "right" }}>
                      {budgetNum > 0 ? `${result.hasArb ? "+" : ""}${(budgetNum * result.profitPct / 100).toFixed(2)}₺` : `${result.hasArb ? "+" : ""}${result.profitPct.toFixed(3)}%`}
                    </div>
                  </div>
                </div>

                <div style={{ fontSize: "11px", color: "#bbb", lineHeight: "1.7" }}>
                  <strong style={{ color: "#aaa" }}>OKEK yöntemi:</strong> Her kombinasyonun oranı tam sayıya çevrilir, OKEK alınır. Her kombinasyona OKEK ÷ kendi tam sayı oranı kadar birim yatırılır. Toplam yatırım &lt; minimum gelir → arbitraj.
                </div>
              </>
            )}
          </div>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
