<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Paçal Sistemi</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600;700&family=Playfair+Display:wght@700&display=swap');

:root {
  --bg: #f5f0e8;
  --paper: #faf7f2;
  --ink: #1a1a1a;
  --muted: #888;
  --border: #d4cdc0;
  --green: #2d6a4f;
  --red: #c1121f;
  --gold: #b5830a;
  --stripe: #f0ebe0;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--ink);
  font-family: 'IBM Plex Mono', monospace;
  min-height: 100vh;
  padding: 32px 20px 60px;
}

h1 {
  font-family: 'Playfair Display', serif;
  font-size: 32px;
  letter-spacing: -1px;
  margin-bottom: 4px;
}

.subtitle {
  font-size: 11px;
  color: var(--muted);
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 32px;
}

.wrap { max-width: 1000px; margin: 0 auto; }

.inputs {
  background: var(--paper);
  border: 1px solid var(--border);
  border-radius: 2px;
  padding: 24px;
  margin-bottom: 20px;
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 20px;
}

@media(max-width: 700px) { .inputs { grid-template-columns: 1fr 1fr; } }
@media(max-width: 400px) { .inputs { grid-template-columns: 1fr; } }

.field label {
  display: block;
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 2px;
  color: var(--muted);
  margin-bottom: 8px;
}

.field input {
  width: 100%;
  background: var(--bg);
  border: 1px solid var(--border);
  font-family: 'IBM Plex Mono', monospace;
  font-size: 15px;
  font-weight: 600;
  padding: 10px 12px;
  color: var(--ink);
  outline: none;
  border-radius: 2px;
  transition: border-color 0.15s;
}

.field input:focus { border-color: var(--ink); }

.field .note {
  font-size: 9px;
  color: var(--muted);
  margin-top: 5px;
  letter-spacing: 0.5px;
}

.btn {
  background: var(--ink);
  color: var(--bg);
  border: none;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  padding: 12px 28px;
  cursor: pointer;
  border-radius: 2px;
  margin-bottom: 32px;
  display: block;
  transition: background 0.15s;
}
.btn:hover { background: #333; }

.section-title {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 3px;
  color: var(--muted);
  margin-bottom: 12px;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--border);
}

.table-wrap {
  background: var(--paper);
  border: 1px solid var(--border);
  border-radius: 2px;
  overflow-x: auto;
  margin-bottom: 32px;
}

table {
  width: 100%;
  border-collapse: collapse;
  font-size: 12px;
}

th {
  padding: 10px 14px;
  text-align: right;
  font-size: 9px;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: var(--muted);
  border-bottom: 1px solid var(--border);
  font-weight: 600;
  white-space: nowrap;
}
th:first-child { text-align: center; }

td {
  padding: 11px 14px;
  text-align: right;
  border-bottom: 1px solid var(--stripe);
  white-space: nowrap;
}
td:first-child { text-align: center; font-weight: 700; }
tr:last-child td { border-bottom: none; }
tr:hover td { background: var(--stripe); }

.pos { color: var(--green); font-weight: 600; }
.neg { color: var(--red); }
.gold { color: var(--gold); font-weight: 700; }

.kademe-badge {
  display: inline-block;
  min-width: 28px;
  height: 28px;
  line-height: 28px;
  padding: 0 6px;
  text-align: center;
  border: 1px solid var(--border);
  border-radius: 2px;
  font-size: 11px;
}

.highlight td { background: rgba(181,131,10,0.06); }

tfoot td {
  padding: 11px 14px;
  text-align: right;
  border-top: 2px solid var(--border);
  font-weight: 700;
  background: var(--stripe);
  white-space: nowrap;
}
tfoot td:first-child { text-align: center; font-size: 10px; letter-spacing: 1px; text-transform: uppercase; }

.empty {
  text-align: center;
  padding: 48px;
  color: var(--muted);
  font-size: 12px;
  line-height: 2;
}

.no-add { color: var(--muted); font-size: 11px; }
</style>
</head>
<body>
<div class="wrap">

  <h1>Paçal Sistemi</h1>
  <p class="subtitle">Maliyet Düşürme — Kripto</p>

  <div class="inputs">
    <div class="field">
      <label>Giriş Fiyatı ($)</label>
      <input type="number" id="price" placeholder="örn. 100" step="any" min="0"/>
    </div>
    <div class="field">
      <label>İlk Alım ($)</label>
      <input type="number" id="first" placeholder="örn. 10" step="any" min="0"/>
    </div>
    <div class="field">
      <label>Kademe Aralığı (%)</label>
      <input type="number" id="step" placeholder="örn. 25" step="any" min="1" max="99"/>
      <div class="note">Her X% düşüşte bir kademe</div>
    </div>
    <div class="field">
      <label>Beklenen Yükseliş (%)</label>
      <input type="number" id="yukselis" placeholder="örn. 5" step="any" min="0.1"/>
      <div class="note">Fiyat bu kadar % çıkacak</div>
    </div>
    <div class="field">
      <label>Hedef Kar (%)</label>
      <input type="number" id="kar" placeholder="örn. 2" step="any" min="0.1"/>
      <div class="note">Toplam harcamanın % karı</div>
    </div>
    <div class="field">
      <label>Max Düşüş (%)</label>
      <input type="number" id="maxdrop" placeholder="örn. 90" step="any" min="1" max="99" value="99"/>
      <div class="note">Kaç %'e kadar hesaplansın</div>
    </div>
  </div>

  <button class="btn" onclick="calc()">Hesapla</button>

  <div id="output">
    <div class="empty">↑ Parametreleri gir ve hesapla.</div>
  </div>

</div>

<script>
function fmt(n, d=2) {
  if (isNaN(n) || n === null) return '—';
  if (Math.abs(n) > 0 && Math.abs(n) < 0.001) return '$' + n.toFixed(8);
  if (Math.abs(n) < 0.1) return '$' + n.toFixed(6);
  return '$' + n.toLocaleString('tr-TR', {minimumFractionDigits: d, maximumFractionDigits: d});
}

function calc() {
  const price    = parseFloat(document.getElementById('price').value);
  const first    = parseFloat(document.getElementById('first').value);
  const step     = parseFloat(document.getElementById('step').value);
  const yukselis = parseFloat(document.getElementById('yukselis').value);
  const kar      = parseFloat(document.getElementById('kar').value);
  const maxdrop  = parseFloat(document.getElementById('maxdrop').value) || 99;

  if (!price || !first || !step || !yukselis || !kar) { alert('Tüm alanları doldur.'); return; }
  if (yukselis <= kar) { alert('Beklenen yükseliş, hedef kardan büyük olmalı.'); return; }

  const ky = 1 + yukselis / 100;
  const kk = 1 + kar / 100;

  const rows = [];
  let cumSpent = 0;
  let cumCoins = 0;
  let drop = 0;

  while (drop <= maxdrop) {
    const kPrice    = price * (1 - drop / 100);
    const sellPrice = kPrice * ky;

    if (drop === 0) {
      cumSpent += first;
      cumCoins += first / kPrice;
      const gelir  = cumCoins * sellPrice;
      const karTL  = gelir - cumSpent;
      const karPct = (karTL / cumSpent) * 100;
      rows.push({ kademe:1, drop:0, kPrice, sellPrice, alim:first, cumSpent, cumCoins, pacal:cumSpent/cumCoins, gelir, karTL, karPct });
    } else {
      // (cumCoins + X/kPrice) * sellPrice = (cumSpent + X) * kk
      // X*(sellPrice/kPrice - kk) = cumSpent*kk - cumCoins*sellPrice
      const X = (cumSpent * kk - cumCoins * sellPrice) / (sellPrice / kPrice - kk);
      cumSpent += X;
      cumCoins += X / kPrice;
      const gelir  = cumCoins * sellPrice;
      const karTL  = gelir - cumSpent;
      const karPct = (karTL / cumSpent) * 100;
      rows.push({ kademe:rows.length+1, drop, kPrice, sellPrice, alim:X, cumSpent, cumCoins, pacal:cumSpent/cumCoins, gelir, karTL, karPct });
    }

    drop += step;
    if (drop > maxdrop && drop - step < maxdrop) drop = maxdrop;
    else if (drop > maxdrop) break;
  }

  let html = `<div class="section-title">Kademe Tablosu — %${yukselis} yükselişte %${kar} kar — %99'a kadar</div>`;
  html += `<div class="table-wrap"><table>
    <thead><tr>
      <th>#</th>
      <th>Düşüş</th>
      <th>Fiyat ($)</th>
      <th>Bu Alım ($)</th>
      <th>Toplam Harcanan ($)</th>
      <th>Paçal Maliyet ($)</th>
      <th>Satış Fiyatı ($)</th>
      <th>Toplam Gelir ($)</th>
      <th>Kar ($)</th>
    </tr></thead>
    <tbody>`;

  rows.forEach((r, i) => {
    const dropCell = r.drop === 0
      ? `<span style="color:var(--muted)">— Giriş</span>`
      : `<span class="neg">▼ %${r.drop}</span>`;

    html += `<tr${i === 0 ? ' class="highlight"' : ''}>
      <td><span class="kademe-badge">${r.kademe}</span></td>
      <td>${dropCell}</td>
      <td class="gold">${fmt(r.kPrice, 4)}</td>
      <td><span class="pos">${fmt(r.alim)}</span></td>
      <td>${fmt(r.cumSpent)}</td>
      <td>${fmt(r.pacal, 4)}</td>
      <td class="gold">${fmt(r.sellPrice, 4)}</td>
      <td>${fmt(r.gelir)}</td>
      <td><span class="pos">${fmt(r.karTL)} (%${r.karPct.toFixed(1)})</span></td>
    </tr>`;
  });

  const last = rows[rows.length - 1];
  html += `</tbody>
    <tfoot><tr>
      <td colspan="3">Toplam</td>
      <td>${fmt(rows.reduce((s,r)=>s+r.alim,0))}</td>
      <td>${fmt(last.cumSpent)}</td>
      <td>${fmt(last.pacal, 4)}</td>
      <td class="gold">${fmt(last.sellPrice, 4)}</td>
      <td>${fmt(last.gelir)}</td>
      <td><span class="pos">${fmt(last.karTL)} (%${last.karPct.toFixed(1)})</span></td>
    </tr></tfoot>
  </table></div>`;

  document.getElementById('output').innerHTML = html;
}
</script>
</body>
</html>
