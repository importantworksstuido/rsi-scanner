<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ADX + RSI SCANNER</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f7fa;
    --panel: #ffffff;
    --border: #d0d7e3;
    --accent: #6366f1;
    --green: #059669;
    --red: #dc2626;
    --yellow: #d97706;
    --blue: #0284c7;
    --text: #1e293b;
    --dim: #64748b;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(99,102,241,0.06) 1px, transparent 1px),
      linear-gradient(90deg, rgba(99,102,241,0.06) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 1300px;
    margin: 0 auto;
    padding: 24px 16px;
  }

  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 28px;
    flex-wrap: wrap;
    gap: 12px;
  }

  .title-block h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 48px;
    letter-spacing: 4px;
    background: linear-gradient(90deg, var(--accent), var(--blue));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1;
  }

  .title-block p {
    font-size: 11px;
    color: var(--dim);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-top: 4px;
  }

  .status-bar {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 11px;
    color: var(--dim);
  }

  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--dim); transition: all 0.3s; }
  .dot.live { background: var(--green); box-shadow: 0 0 8px var(--green); animation: pulse 1.5s infinite; }
  .dot.scanning { background: var(--yellow); box-shadow: 0 0 8px var(--yellow); animation: pulse 0.5s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  .controls {
    display: flex;
    align-items: flex-end;
    gap: 12px;
    margin-bottom: 20px;
    padding: 18px;
    background: var(--panel);
    border: 1px solid var(--border);
    clip-path: polygon(0 0, calc(100% - 16px) 0, 100% 16px, 100% 100%, 0 100%);
    flex-wrap: wrap;
  }

  .ctrl-group label {
    display: block;
    font-size: 10px;
    color: var(--dim);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 5px;
  }

  .ctrl-group select {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 7px 10px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 13px;
    outline: none;
    transition: border-color 0.2s;
  }
  .ctrl-group select:focus { border-color: var(--accent); }
  .ctrl-group select option { background: var(--bg); }

  .scan-btn {
    background: transparent;
    border: 1px solid var(--accent);
    color: var(--accent);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 3px;
    padding: 7px 24px;
    cursor: pointer;
    transition: all 0.2s;
    clip-path: polygon(0 0, calc(100% - 10px) 0, 100% 10px, 100% 100%, 0 100%);
    white-space: nowrap;
  }
  .scan-btn:hover:not(:disabled) {
    background: var(--accent);
    color: #ffffff;
    box-shadow: 0 0 20px rgba(99,102,241,0.4);
  }
  .scan-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .progress-wrap { margin-bottom: 14px; display: none; }
  .progress-wrap.show { display: block; }
  .progress-label { display: flex; justify-content: space-between; font-size: 11px; color: var(--dim); margin-bottom: 5px; }
  .progress-bar { height: 3px; background: var(--border); overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--blue)); width: 0%; transition: width 0.3s; box-shadow: 0 0 8px rgba(99,102,241,0.3); }

  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 12px; }
  thead th {
    text-align: left; padding: 9px 10px;
    font-size: 10px; letter-spacing: 2px; text-transform: uppercase;
    color: var(--dim); border-bottom: 1px solid var(--border);
    white-space: nowrap; cursor: pointer; user-select: none;
  }
  thead th:hover { color: var(--text); }
  thead th.active { color: var(--accent); }
  tbody tr { border-bottom: 1px solid rgba(208,215,227,0.8); transition: background 0.15s; animation: fadeIn 0.3s ease forwards; opacity: 0; }
  tbody tr:hover { background: rgba(99,102,241,0.05); }
  @keyframes fadeIn { to { opacity: 1; } }
  tbody td { padding: 10px 10px; white-space: nowrap; }

  .symbol { color: var(--text); font-weight: bold; letter-spacing: 1px; }
  .symbol span { color: var(--dim); font-size: 10px; }

  .adx-val { font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 1px; color: var(--yellow); }
  .adx-val.extreme { color: #b45309; }

  .rsi-val { font-family: 'Bebas Neue', sans-serif; font-size: 20px; }
  .rsi-val.oversold { color: var(--green); }
  .rsi-val.overbought { color: var(--red); }
  .rsi-val.neutral { color: var(--dim); }

  .price { color: var(--text); }
  .change.pos { color: var(--green); }
  .change.neg { color: var(--red); }

  .empty { text-align: center; padding: 60px 20px; color: var(--dim); }
  .empty .big { font-family: 'Bebas Neue', sans-serif; font-size: 48px; color: #cbd5e1; margin-bottom: 12px; }

  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--dim); }
</style>
</head>
<body>
<div class="container">

  <div class="header">
    <div class="title-block">
      <h1>ADX + RSI SCANNER</h1>
      <p>Binance USDT Spot · 200 Coin</p>
    </div>
    <div class="status-bar">
      <div class="dot" id="statusDot"></div>
      <span id="statusText">HAZIR</span>
    </div>
  </div>

  <div class="controls">
    <div class="ctrl-group">
      <label>Zaman Dilimi</label>
      <select id="interval">
        <option value="5m">5 Dakika</option>
        <option value="15m" selected>15 Dakika</option>
        <option value="1h">1 Saat</option>
        <option value="4h">4 Saat</option>
        <option value="1d">Günlük</option>
      </select>
    </div>
    <div class="ctrl-group">
      <label>Tarama Yap</label>
      <button class="scan-btn" id="scanBtn" onclick="startScan()">▶ TARA</button>
    </div>
  </div>

  <div class="progress-wrap" id="progressWrap">
    <div class="progress-label">
      <span id="progressText">Taranıyor...</span>
      <span id="progressPct">0%</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th onclick="sortBy('symbol')">Sembol <span id="sort-symbol"></span></th>
          <th onclick="sortBy('adx')">ADX <span id="sort-adx"></span></th>
          <th onclick="sortBy('rsi')">RSI <span id="sort-rsi"></span></th>
          <th onclick="sortBy('price')">Fiyat <span id="sort-price"></span></th>
          <th onclick="sortBy('change')">% Değişim <span id="sort-change"></span></th>
        </tr>
      </thead>
      <tbody id="tableBody">
        <tr><td colspan="5">
          <div class="empty">
            <div class="big">BEKLEMEDE</div>
            <div>TARA butonuna bas, Binance spot piyasasını tarayalım</div>
          </div>
        </td></tr>
      </tbody>
    </table>
  </div>
</div>

<script>
let allResults = [];
let sortKey = 'adx';
let sortAsc = false;

async function startScan() {
  const btn = document.getElementById('scanBtn');
  btn.disabled = true;
  setStatus('scanning', 'TARANYOR...');
  showProgress(true);

  const interval = document.getElementById('interval').value;
  const adxPeriod = 14;
  const rsiPeriod = 14;
  const minVol = 500000;

  const startTime = Date.now();
  allResults = [];

  try {
    updateProgress(5, 'Piyasa verileri alınıyor...');
    const tickerRes = await fetch('https://api.binance.com/api/v3/ticker/24hr');
    const tickers = await tickerRes.json();

    const usdtPairs = tickers
      .filter(t => t.symbol.endsWith('USDT') && parseFloat(t.quoteVolume) >= minVol)
      .sort((a, b) => parseFloat(b.quoteVolume) - parseFloat(a.quoteVolume))
      .slice(0, 200);

    const total = usdtPairs.length;

    const BATCH = 8;
    for (let i = 0; i < total; i += BATCH) {
      const batch = usdtPairs.slice(i, i + BATCH);
      await Promise.all(batch.map(t => scanCoin(t, interval, adxPeriod, rsiPeriod)));
      const pct = Math.round(((i + BATCH) / total) * 90) + 5;
      updateProgress(Math.min(pct, 95), `Taraniyor... ${Math.min(i + BATCH, total)}/${total}`);
    }

    updateProgress(100, 'Tamamlandı!');
    const elapsed = ((Date.now() - startTime) / 1000).toFixed(1);
    setStatus('live', `TAMAMLANDI · ${allResults.length} coin · ${elapsed}s`);

    renderTable();

  } catch (e) {
    setStatus('idle', 'HATA: ' + e.message);
    console.error(e);
  }

  setTimeout(() => showProgress(false), 1500);
  btn.disabled = false;
}

async function scanCoin(ticker, interval, adxPeriod, rsiPeriod) {
  try {
    const symbol = ticker.symbol;
    const res = await fetch(`https://api.binance.com/api/v3/klines?symbol=${symbol}&interval=${interval}&limit=200`);
    const klines = await res.json();
    if (!Array.isArray(klines) || klines.length < adxPeriod + 5) return;

    const highs = klines.map(k => parseFloat(k[2]));
    const lows = klines.map(k => parseFloat(k[3]));
    const closes = klines.map(k => parseFloat(k[4]));

    const adxResult = calcADX(highs, lows, closes, adxPeriod);
    const rsi = calcRSI(closes, rsiPeriod);

    if (adxResult === null || rsi === null) return;

    const { adx } = adxResult;
    const price = parseFloat(ticker.lastPrice);
    const change = parseFloat(ticker.priceChangePercent);

    allResults.push({ symbol, adx, rsi, price, change });
  } catch (e) {}
}

function openBinance(symbol) {
  const appUrl = "binance://trade?symbol=" + symbol;
  const webUrl = "https://www.binance.com/tr/trade/" + symbol;
  const iframe = document.createElement("iframe");
  iframe.style.display = "none";
  iframe.src = appUrl;
  document.body.appendChild(iframe);
  setTimeout(() => {
    document.body.removeChild(iframe);
    window.open(webUrl, "_blank");
  }, 1500);
}

function calcADX(highs, lows, closes, period) {
  if (closes.length < period + 2) return null;
  const n = closes.length;
  const trArr = [], pdmArr = [], mdmArr = [];

  for (let i = 1; i < n; i++) {
    const hl = highs[i] - lows[i];
    const hpc = Math.abs(highs[i] - closes[i-1]);
    const lpc = Math.abs(lows[i] - closes[i-1]);
    trArr.push(Math.max(hl, hpc, lpc));
    const upMove = highs[i] - highs[i-1];
    const downMove = lows[i-1] - lows[i];
    pdmArr.push(upMove > downMove && upMove > 0 ? upMove : 0);
    mdmArr.push(downMove > upMove && downMove > 0 ? downMove : 0);
  }

  let atr = trArr.slice(0, period).reduce((a,b) => a+b, 0);
  let pdm = pdmArr.slice(0, period).reduce((a,b) => a+b, 0);
  let mdm = mdmArr.slice(0, period).reduce((a,b) => a+b, 0);

  const dxArr = [];
  for (let i = period; i < trArr.length; i++) {
    atr = atr - atr/period + trArr[i];
    pdm = pdm - pdm/period + pdmArr[i];
    mdm = mdm - mdm/period + mdmArr[i];
    const pdi = atr > 0 ? 100 * pdm / atr : 0;
    const mdi = atr > 0 ? 100 * mdm / atr : 0;
    const dx = (pdi + mdi) > 0 ? 100 * Math.abs(pdi - mdi) / (pdi + mdi) : 0;
    dxArr.push({ dx, pdi, mdi });
  }

  if (dxArr.length < period) return null;
  let adx = dxArr.slice(0, period).reduce((a,b) => a + b.dx, 0) / period;
  let lastPdi = dxArr[period-1].pdi;
  let lastMdi = dxArr[period-1].mdi;

  for (let i = period; i < dxArr.length; i++) {
    adx = (adx * (period-1) + dxArr[i].dx) / period;
    lastPdi = dxArr[i].pdi;
    lastMdi = dxArr[i].mdi;
  }

  return { adx, pdi: lastPdi, mdi: lastMdi };
}

function calcRSI(closes, period) {
  if (closes.length < period + 1) return null;
  let gains = 0, losses = 0;
  for (let i = 1; i <= period; i++) {
    const diff = closes[i] - closes[i-1];
    if (diff > 0) gains += diff; else losses += Math.abs(diff);
  }
  let avgGain = gains / period;
  let avgLoss = losses / period;
  for (let i = period + 1; i < closes.length; i++) {
    const diff = closes[i] - closes[i-1];
    avgGain = (avgGain * (period-1) + (diff > 0 ? diff : 0)) / period;
    avgLoss = (avgLoss * (period-1) + (diff < 0 ? Math.abs(diff) : 0)) / period;
  }
  if (avgLoss === 0) return 100;
  return 100 - (100 / (1 + avgGain / avgLoss));
}

function sortBy(key) {
  if (sortKey === key) sortAsc = !sortAsc;
  else { sortKey = key; sortAsc = true; }
  renderTable();
}

function renderTable() {
  let data = [...allResults];
  data.sort((a, b) => {
    let av = a[sortKey], bv = b[sortKey];
    if (typeof av === 'string') return sortAsc ? av.localeCompare(bv) : bv.localeCompare(av);
    return sortAsc ? av - bv : bv - av;
  });

  // Update sort indicators
  ['symbol','adx','rsi','price','change'].forEach(k => {
    const el = document.getElementById('sort-' + k);
    if (el) el.textContent = sortKey === k ? (sortAsc ? '▲' : '▼') : '';
  });

  const tbody = document.getElementById('tableBody');
  if (data.length === 0) {
    tbody.innerHTML = `<tr><td colspan="5"><div class="empty"><div class="big">BEKLEMEDE</div><div>TARA butonuna bas</div></div></td></tr>`;
    return;
  }

  tbody.innerHTML = data.map((r, i) => {
    const adxClass = r.adx >= 60 ? 'extreme' : '';
    const rsiClass = r.rsi <= 30 ? 'oversold' : r.rsi >= 70 ? 'overbought' : 'neutral';
    const sym = r.symbol.replace('USDT', '');
    const priceStr = r.price < 0.001 ? r.price.toExponential(2) : r.price < 1 ? r.price.toFixed(5) : r.price.toFixed(2);
    const changeClass = r.change >= 0 ? 'pos' : 'neg';
    const changeStr = (r.change >= 0 ? '+' : '') + r.change.toFixed(2) + '%';

    return `<tr style="animation-delay:${i*0.01}s">
      <td><a href="#" onclick="openBinance('${r.symbol}');return false;" style="text-decoration:none;cursor:pointer"><span class="symbol">${sym}<span>/USDT</span></span></a></td>
      <td class="adx-val ${adxClass}">${r.adx.toFixed(1)}</td>
      <td class="rsi-val ${rsiClass}">${r.rsi.toFixed(1)}</td>
      <td class="price">${priceStr}</td>
      <td class="change ${changeClass}">${changeStr}</td>
    </tr>`;
  }).join('');
}

function setStatus(state, text) {
  const dot = document.getElementById('statusDot');
  dot.className = 'dot' + (state === 'scanning' ? ' scanning' : state === 'live' ? ' live' : '');
  document.getElementById('statusText').textContent = text;
}
function showProgress(show) { document.getElementById('progressWrap').classList.toggle('show', show); }
function updateProgress(pct, text) {
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressText').textContent = text;
  document.getElementById('progressPct').textContent = pct + '%';
}
</script>
</body>
</html>
